services:
  - type: web
    name: zero-mumu-tax-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: zero-mumu-tax-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: zero-mumu-tax-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: CORS_ORIGINS
        value: https://your-netlify-app.netlify.app,https://your-custom-domain.com
      - key: FRONTEND_URL
        value: https://your-netlify-app.netlify.app

databases:
  - name: zero-mumu-tax-db
    databaseName: tax_app
    user: tax_user

redis:
  - name: zero-mumu-tax-redis
    plan: free